<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Aralaganwila Offers</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{font-family:'Nunito',sans-serif;}
body{background:#f8fafc;margin:0;max-width:430px;margin:0 auto;min-height:100vh;position:relative;}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
.offer-card{background:#fff;border-radius:1.25rem;border:1px solid #f1f5f9;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,0.05);transition:transform 0.2s,box-shadow 0.2s;}
.cat-btn{display:flex;flex-direction:column;align-items:center;gap:0.4rem;flex-shrink:0;cursor:pointer;}
.cat-circle{width:56px;height:56px;border-radius:1rem;display:flex;align-items:center;justify-content:center;font-size:1.5rem;border:2px solid #e2e8f0;background:#fff;transition:all 0.2s;}
.cat-btn.active .cat-circle{background:linear-gradient(135deg,#16a34a,#059669);border-color:transparent;transform:scale(1.08);}
.cat-btn.active span{color:#16a34a;font-weight:900;}
.cat-btn span{font-size:0.68rem;font-weight:700;color:#94a3b8;}
.whatsapp-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:0.4rem;padding:0.5rem;border-radius:0.75rem;background:linear-gradient(135deg,#22c55e,#16a34a);color:#fff;font-size:0.72rem;font-weight:900;border:none;cursor:pointer;}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:#fff;border-top:1px solid #f1f5f9;display:flex;padding:0.5rem 0;z-index:30;box-shadow:0 -4px 16px rgba(0,0,0,0.06);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:0.2rem;cursor:pointer;padding:0.35rem 0;}
.nav-item span:first-child{font-size:1.2rem;}
.nav-item span:last-child{font-size:0.62rem;font-weight:800;color:#94a3b8;}
.nav-item.active span:last-child{color:#16a34a;}
.empty-state{text-align:center;padding:3rem 1rem;}
</style>
</head>
<body>

<div id="loadingScreen" style="position:fixed;inset:0;background:#fff;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
  <div style="width:56px;height:56px;border-radius:1.25rem;background:linear-gradient(135deg,#16a34a,#059669);display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(22,163,74,0.35);">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
  </div>
  <div style="font-weight:900;font-size:1.1rem;color:#0f172a;">Aralaganwila Offers</div>
  <div style="font-size:0.8rem;color:#94a3b8;font-weight:700;">Loading deals...</div>
  <svg class="spin" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
</div>

<div id="mainApp" style="display:none;padding-bottom:80px;">
  <div style="background:#fff;padding:1rem 1.1rem 0.75rem;position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(0,0,0,0.06);">
    <div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.75rem;">
      <div style="width:28px;height:28px;border-radius:0.5rem;background:linear-gradient(135deg,#16a34a,#059669);display:flex;align-items:center;justify-content:center;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M20.59 13.41l-7.17 7.17a2 2 0 0 1-2.83 0L2 12V2h10l8.59 8.59a2 2 0 0 1 0 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
      </div>
      <span style="font-weight:900;font-size:1.1rem;color:#0f172a;">Aralaganwila <span style="color:#16a34a;">Offers</span></span>
    </div>
    <div style="position:relative;margin-bottom:0.75rem;">
      <svg style="position:absolute;left:0.875rem;top:50%;transform:translateY(-50%);" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input id="searchInput" oninput="handleSearch()" type="text" placeholder="Search Offers or Shops..."
        style="width:100%;padding:0.75rem 1rem 0.75rem 2.5rem;border-radius:1rem;background:#f8fafc;border:2px solid transparent;font-size:0.875rem;font-weight:600;color:#374151;outline:none;box-sizing:border-box;"/>
    </div>
    <div style="display:flex;gap:0.875rem;overflow-x:auto;padding-bottom:0.5rem;scrollbar-width:none;">
      <div class="cat-btn active" onclick="selectCat('All',this)"><div class="cat-circle">✨</div><span>All</span></div>
      <div class="cat-btn" onclick="selectCat('Grocery',this)"><div class="cat-circle">🛒</div><span>Grocery</span></div>
      <div class="cat-btn" onclick="selectCat('Pharmacy',this)"><div class="cat-circle">💊</div><span>Pharmacy</span></div>
      <div class="cat-btn" onclick="selectCat('Hardware',this)"><div class="cat-circle">🔧</div><span>Hardware</span></div>
      <div class="cat-btn" onclick="selectCat('Food',this)"><div class="cat-circle">🍔</div><span>Food</span></div>
    </div>
  </div>

  <div style="padding:1rem 1rem 0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.875rem;">
      <span style="font-weight:900;color:#0f172a;" id="sectionTitle">All Offers</span>
      <span style="font-size:0.78rem;font-weight:800;color:#94a3b8;" id="offerCountLabel">Loading...</span>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;" id="offersGrid"></div>
  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item active"><span>🏠</span><span>Home</span></div>
  <div class="nav-item"><span>⭐</span><span>Favorites</span></div>
  <div class="nav-item"><span>🗺️</span><span>Shops</span></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, query, where, doc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXeKNB777fNBK2zHqY6hGrvEfc0DH4VJs",
  authDomain: "aralaganwila-offers.firebaseapp.com",
  projectId: "aralaganwila-offers",
  storageBucket: "aralaganwila-offers.firebasestorage.app",
  messagingSenderId: "465514956115",
  appId: "1:465514956115:web:53ce2f4ebfd4f7d1fc8da6"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);
const $   = id => document.getElementById(id);

let allOffers = [], filteredOffers = [];
let activeCat = 'All', searchQ = '';

// 👤 AUTO ADD CUSTOMER TO DB FOR ADMIN TO SEE
signInAnonymously(auth);
onAuthStateChanged(auth, user => {
  if(user) {
    setDoc(doc(db, 'users', user.uid), {
      uid: user.uid,
      name: "Customer",
      lastActive: new Date().toISOString(),
      type: 'customer'
    }, {merge: true});
  }
});

onSnapshot(query(collection(db,'offers'), where('status','==','approved')), snap => {
  allOffers = snap.docs.map(d=>({id:d.id,...d.data()}));
  allOffers.sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
  $('loadingScreen').style.display='none';
  $('mainApp').style.display='block';
  render();
});

function render() {
  filteredOffers = allOffers.filter(o=>{
    const q=searchQ.toLowerCase();
    const mq=!q||(o.product||'').toLowerCase().includes(q)||(o.shop||'').toLowerCase().includes(q);
    const mc=activeCat==='All'||o.category===activeCat;
    return mq&&mc;
  });

  $('sectionTitle').textContent = activeCat==='All'?'All Offers':activeCat+' Offers';
  $('offerCountLabel').textContent = filteredOffers.length+' deals';

  if(!filteredOffers.length) {
    $('offersGrid').innerHTML=`<div class="empty-state" style="grid-column:1/-1;"><div style="font-size:3rem;">🔍</div><div style="font-weight:900;color:#94a3b8;">No offers found</div></div>`;
    return;
  }

  $('offersGrid').innerHTML = filteredOffers.map(o=>{
    const orig=o.original||0, disc=o.discount||0;
    const pct=orig?Math.round(((orig-disc)/orig)*100):0;
    return `<div class="offer-card">
      <div style="position:relative;">
        ${o.image?`<img src="${o.image}" style="width:100%;height:110px;object-fit:cover;">`:`<div style="height:110px;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:2rem;">🏷️</div>`}
        ${pct?`<div style="position:absolute;top:0.5rem;right:0.5rem;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;font-size:0.65rem;font-weight:900;padding:0.2rem 0.5rem;border-radius:9999px;">-${pct}%</div>`:''}
        <div style="position:absolute;top:0.5rem;left:0.5rem;background:rgba(0,0,0,0.45);color:#fff;font-size:0.62rem;font-weight:800;padding:0.15rem 0.45rem;border-radius:9999px;">${o.category||''}</div>
      </div>
      <div style="padding:0.75rem;">
        <div style="font-weight:900;color:#0f172a;font-size:0.8rem;">${o.product||''}</div>
        <div style="font-size:0.68rem;color:#94a3b8;font-weight:700;">📍 ${o.shop||''}</div>
        <div style="margin-top:0.4rem;">
          <div style="font-size:0.68rem;color:#94a3b8;text-decoration:line-through;">Rs.${orig}</div>
          <div style="font-size:1.05rem;font-weight:900;color:#16a34a;">Rs.${disc}</div>
        </div>
        <button class="whatsapp-btn" onclick="shareWhatsApp('${o.id}')" style="margin-top:0.5rem;">Share Deal</button>
      </div>
    </div>`;
  }).join('');
}

window.handleSearch = () => { searchQ=$('searchInput').value; render(); };
window.selectCat = (cat, el) => {
  activeCat = cat; document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('active')); el.classList.add('active'); render();
};
window.shareWhatsApp = (id) => {
  const o = allOffers.find(x=>x.id===id); if(!o) return;
  try { updateDoc(doc(db,'offers',id),{views:increment(1)}); } catch(e){}
  const msg=encodeURIComponent(`🔥 Look at this offer in Aralaganwila!\n\n*${o.product}*\n📍 ${o.shop}\n💰 Only Rs. ${o.discount}/- (Was Rs. ${o.original}/-)\n\nDon't miss it! 🛒`);
  window.open(`https://api.whatsapp.com/send?text=${msg}`,'_blank');
};
</script>
</body>
</html>
