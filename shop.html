<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Shop — Aralaganwila Offers</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com"></script>
<style>
* { font-family:'Nunito',sans-serif; }
body { background:#f0fdf4; margin:0; max-width:480px; margin:0 auto; min-height:100vh; }
@keyframes slideUp { from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1} }
.card { background:#fff; border-radius:1.25rem; border:1px solid #e2e8f0; box-shadow:0 2px 12px rgba(0,0,0,0.06); }
.page { display:none; } .page.active { display:block; animation:slideUp 0.3s ease; }
.tab-btn { flex:1; padding:0.65rem; border:none; background:none; cursor:pointer; font-weight:800; font-size:0.8rem; color:#94a3b8; border-radius:0.75rem; transition:all 0.2s; }
.tab-btn.active { background:linear-gradient(135deg,#16a34a,#059669); color:#fff; }
.field { display:flex;flex-direction:column;gap:0.35rem;margin-bottom:0.875rem; }
.field label { font-size:0.78rem;font-weight:800;color:#64748b; }
.field input, .field select, .field textarea { padding:0.7rem 0.875rem;border:1.5px solid #e2e8f0;border-radius:0.875rem;font-size:0.875rem;font-weight:600;outline:none; }
.btn-green { width:100%;padding:0.875rem;border-radius:1rem;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;font-weight:900;font-size:0.95rem;border:none;cursor:pointer; }
.badge { display:inline-flex;align-items:center;gap:0.3rem;padding:0.2rem 0.6rem;border-radius:9999px;font-size:0.68rem;font-weight:800; }
.badge-approved{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0}
.badge-pending{background:#fffbeb;color:#b45309;border:1px solid #fde68a}
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:999;padding:0.75rem 1.5rem;border-radius:1rem;color:#fff;font-weight:800;font-size:0.875rem;white-space:nowrap}
.loading-overlay{position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem}
.offer-card { padding:1rem;border-bottom:1px solid #f1f5f9;display:flex;gap:0.875rem;align-items:start; }
</style>
</head>
<body>

<div id="loadingScreen" class="loading-overlay">
  <div style="font-weight:900;color:#0f172a;">Loading your shop...</div>
</div>

<div id="loginScreen" style="display:none;min-height:100vh;padding:2rem 1.25rem;">
  <div style="text-align:center;padding-top:3rem;margin-bottom:2.5rem;">
    <div style="font-weight:900;font-size:1.6rem;color:#0f172a;">Shop Owner Portal</div>
  </div>
  <div class="card" style="padding:1.75rem;">
    <button id="googleSignInBtn" onclick="doGoogleLogin()" class="btn-green" style="margin-bottom:1rem; background:#fff; color:#374151; border:2px solid #e2e8f0;">Continue with Google</button>
    <div style="border-top:1px solid #f1f5f9;padding-top:1rem;">
      <div style="font-weight:900;font-size:0.9rem;margin-bottom:1rem;">New shop? Register here 👇</div>
      <div class="field"><label>Shop Name</label><input id="regName" type="text" placeholder="e.g. Singhe Stores"/></div>
      <div class="field"><label>Owner Name</label><input id="regOwner" type="text" placeholder="Your full name"/></div>
      <div class="field"><label>Phone</label><input id="regPhone" type="tel" placeholder="077-XXXXXXX"/></div>
      <div class="field"><label>Category</label>
        <select id="regCat"><option value="">Select category</option><option>Grocery</option><option>Pharmacy</option><option>Hardware</option><option>Food</option><option>Fashion</option></select>
      </div>
      <div class="field"><label>Location</label><input id="regLocation" type="text" placeholder="e.g. Town Center, Aralaganwila"/></div>
      <button onclick="registerShop()" id="regBtn" class="btn-green">Register My Shop 🏪</button>
    </div>
  </div>
</div>

<div id="shopApp" style="display:none;">
  <div style="background:linear-gradient(135deg,#16a34a,#059669);padding:1.25rem;padding-top:1.5rem;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.5rem;">
      <div><div style="font-weight:900;font-size:1.1rem;color:#fff;" id="shopNameHeader">My Shop</div></div>
      <button onclick="doLogout()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;font-size:0.75rem;font-weight:800;padding:0.4rem 0.75rem;border-radius:0.75rem;cursor:pointer;">Sign Out</button>
    </div>
    <div style="display:flex;background:rgba(255,255,255,0.15);border-radius:1rem;padding:0.35rem;gap:0.25rem;margin-top:0.75rem;">
      <button class="tab-btn active" onclick="switchTab('home',this)">🏠 Home</button>
      <button class="tab-btn" onclick="switchTab('add',this)">➕ Add Offer</button>
      <button class="tab-btn" onclick="switchTab('myoffers',this)">🏷️ My Offers</button>
    </div>
  </div>

  <div id="tab-home" class="page active" style="padding:1.25rem;">
    <div class="card" style="padding:1.25rem;margin-bottom:1rem;" id="shopStatusCard">
      <div style="font-weight:900;color:#0f172a;margin-bottom:0.5rem;" id="homeShopName">Your Shop</div>
      <div id="shopApprovalBadge"></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.875rem;margin-bottom:1rem;">
      <div class="card" style="padding:1rem;text-align:center;"><div style="font-size:1.75rem;font-weight:900;color:#16a34a;" id="myOfferCount">0</div><div style="font-size:0.75rem;font-weight:800;color:#64748b;">Active Offers</div></div>
      <div class="card" style="padding:1rem;text-align:center;"><div style="font-size:1.75rem;font-weight:900;color:#f59e0b;" id="myPendingCount">0</div><div style="font-size:0.75rem;font-weight:800;color:#64748b;">Pending Review</div></div>
    </div>
  </div>

  <div id="tab-add" class="page" style="padding:1.25rem;">
    <div class="card" style="padding:1.25rem;">
      <div style="font-weight:900;font-size:1.1rem;color:#0f172a;margin-bottom:1.25rem;">➕ Add New Offer</div>
      <div class="field"><label>Product Name *</label><input id="offProduct" type="text" placeholder="e.g. Raththi 400g"/></div>
      <div class="field"><label>Category *</label>
        <select id="offCat"><option value="">Select category</option><option>Grocery</option><option>Pharmacy</option><option>Hardware</option><option>Food</option><option>Fashion</option></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;">
        <div class="field"><label>Original Price *</label><input id="offOriginal" type="number" placeholder="680"/></div>
        <div class="field"><label>Discount Price *</label><input id="offDiscount" type="number" placeholder="590"/></div>
      </div>
      <div class="field"><label>Image URL (optional)</label><input id="offImage" type="url" placeholder="https://..."/></div>
      <button class="btn-green" onclick="submitOffer()" id="addBtn">Submit Offer for Review 🚀</button>
    </div>
  </div>

  <div id="tab-myoffers" class="page" style="padding:1.25rem;">
    <div class="card">
      <div style="padding:1rem 1.25rem;border-bottom:1px solid #f1f5f9;font-weight:900;color:#0f172a;">My Offers</div>
      <div id="myOffersList"><div style="padding:2.5rem;text-align:center;color:#94a3b8;font-weight:800;">No offers yet! 🏷️</div></div>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where, doc, deleteDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyAXeKNB777fNBK2zHqY6hGrvEfc0DH4VJs",
  authDomain: "aralaganwila-offers.firebaseapp.com",
  projectId: "aralaganwila-offers",
  storageBucket: "aralaganwila-offers.firebasestorage.app",
  messagingSenderId: "465514956115",
  appId: "1:465514956115:web:53ce2f4ebfd4f7d1fc8da6"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const $ = id => document.getElementById(id);
let currentUser = null, myShop = null, myOffers = [];

function toast(msg) {
  document.querySelectorAll('.toast').forEach(t=>t.remove());
  const t=document.createElement('div'); t.className='toast'; t.style.background='#16a34a'; t.innerHTML=msg;
  document.body.appendChild(t); setTimeout(()=>t.remove(),3000);
}

window.doGoogleLogin = async () => { await signInWithPopup(auth, provider); };
window.doLogout = async () => { await signOut(auth); };
window.switchTab = (tab, btn) => {
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  $('tab-'+tab).classList.add('active'); if(btn) btn.classList.add('active');
};

onAuthStateChanged(auth, async user => {
  $('loadingScreen').style.display='none';
  currentUser = user;
  if(user) {
    $('loginScreen').style.display='none'; $('shopApp').style.display='block';
    onSnapshot(query(collection(db,'shops'), where('ownerUid','==',user.uid)), snap => {
      if(!snap.empty) {
        myShop = {id:snap.docs.id, ...snap.docs.data()};
        $('shopNameHeader').textContent=myShop.name; $('homeShopName').textContent=myShop.name;
        $('shopApprovalBadge').innerHTML = myShop.status==='approved'?'<span class="badge badge-approved">✅ Approved</span>':'<span class="badge badge-pending">⏳ Pending Approval</span>';
        
        onSnapshot(query(collection(db,'offers'), where('ownerUid','==',user.uid)), oSnap => {
          myOffers = oSnap.docs.map(d=>({id:d.id,...d.data()})); renderOffers();
        });
      } else {
        $('homeShopName').textContent='Shop not registered yet';
      }
    });
  } else {
    $('loginScreen').style.display='block'; $('shopApp').style.display='none';
  }
});

window.registerShop = async () => {
  const name=$('regName').value, owner=$('regOwner').value, phone=$('regPhone').value, cat=$('regCat').value, loc=$('regLocation').value;
  if(!name||!owner||!phone||!cat||!loc) return toast('Fill all fields!');
  await addDoc(collection(db,'shops'), { name, ownerName:owner, phone, category:cat, location:loc, status:'pending', ownerUid: currentUser.uid });
  toast('Shop registered! Waiting for Admin approval.');
};

window.submitOffer = async () => {
  if(!myShop) return toast('Shop not found!');
  if(myShop.status!=='approved') return toast('Wait for shop approval first!');
  const product=$('offProduct').value, cat=$('offCat').value, orig=parseFloat($('offOriginal').value)||0, disc=parseFloat($('offDiscount').value)||0, img=$('offImage').value;
  if(!product||!cat||!orig||!disc) return toast('Fill required fields!');
  await addDoc(collection(db,'offers'), { product, category:cat, original:orig, discount:disc, image:img, shop:myShop.name, ownerUid:currentUser.uid, status:'pending', createdAt:serverTimestamp() });
  ['offProduct','offOriginal','offDiscount','offImage'].forEach(id=>$(id).value='');
  toast('✅ Offer submitted! Admin will review soon.');
  switchTab('myoffers', document.querySelectorAll('.tab-btn'));
};

// 🗑️ DELETE FUNCTION 
window.deleteOffer = async (id) => {
  if(confirm('Are you sure you want to delete this offer?')) {
    await deleteDoc(doc(db, 'offers', id));
    toast('🗑️ Offer deleted successfully!');
  }
};

function renderOffers() {
  $('myOfferCount').textContent = myOffers.filter(o=>o.status==='approved').length;
  $('myPendingCount').textContent = myOffers.filter(o=>o.status==='pending').length;
  if(!myOffers.length) return $('myOffersList').innerHTML='<div style="padding:2.5rem;text-align:center;color:#94a3b8;font-weight:800;">No offers yet! 🏷️</div>';
  
  $('myOffersList').innerHTML = myOffers.map(o=>`
    <div class="offer-card">
      ${o.image?`<img src="${o.image}" style="width:56px;height:56px;border-radius:0.75rem;object-fit:cover;">`:`<div style="width:56px;height:56px;border-radius:0.75rem;background:#f1f5f9;display:flex;align-items:center;justify-content:center;font-size:1.4rem;">🏷️</div>`}
      <div style="flex:1;">
        <div style="font-weight:900;color:#0f172a;font-size:0.9rem;">${o.product}</div>
        <div style="margin-top:0.3rem;"><span style="font-size:0.8rem;color:#94a3b8;text-decoration:line-through;">Rs.${o.original}</span> <span style="font-size:1rem;font-weight:900;color:#16a34a;">Rs.${o.discount}</span></div>
        <div style="display:flex; justify-content:space-between; align-items:center; margin-top:0.4rem;">
          <span class="badge badge-${o.status||'pending'}">${o.status==='approved'?'✅ Live':'⏳ Pending'}</span>
          <button onclick="deleteOffer('${o.id}')" style="background:#fee2e2;color:#b91c1c;border:none;padding:0.3rem 0.6rem;border-radius:0.5rem;font-size:0.7rem;font-weight:800;cursor:pointer;">🗑️ Delete</button>
        </div>
      </div>
    </div>`).join('');
}
</script>
</body>
</html>
