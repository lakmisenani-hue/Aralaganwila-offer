<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>My Shop — Aralaganwila Offers</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
<style>
*{font-family:'Nunito',sans-serif;box-sizing:border-box;}
body{background:#f0fdf4;margin:0;max-width:480px;margin:0 auto;min-height:100vh;}
@keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.spin{animation:spin 1s linear infinite}
.card{background:#fff;border-radius:1.25rem;border:1px solid #e2e8f0;box-shadow:0 4px 16px rgba(0,0,0,0.06);}
.page{display:none}.page.active{display:block;animation:slideUp 0.3s ease}
.tab-btn{flex:1;padding:0.65rem;border:none;background:none;cursor:pointer;font-weight:800;font-size:0.8rem;color:rgba(255,255,255,0.65);border-radius:0.75rem;transition:all 0.2s;}
.tab-btn.active{background:rgba(255,255,255,0.25);color:#fff;}
.field{display:flex;flex-direction:column;gap:0.4rem;margin-bottom:1rem;}
.field label{font-size:0.8rem;font-weight:800;color:#475569;}
.field input,.field select,.field textarea{padding:0.75rem 1rem;border:1.5px solid #e2e8f0;border-radius:0.875rem;font-size:0.9rem;font-weight:700;color:#0f172a;outline:none;transition:border 0.2s;font-family:inherit;width:100%;}
.field input:focus,.field select:focus,.field textarea:focus{border-color:#16a34a;}
.btn-green{width:100%;padding:0.9rem;border-radius:1rem;background:linear-gradient(135deg,#16a34a,#059669);color:#fff;font-weight:900;font-size:1rem;border:none;cursor:pointer;box-shadow:0 4px 16px rgba(22,163,74,0.3);}
.btn-green:disabled{opacity:0.6;cursor:not-allowed;}
.badge{display:inline-flex;align-items:center;gap:0.3rem;padding:0.25rem 0.75rem;border-radius:9999px;font-size:0.75rem;font-weight:900;border-width:1px;border-style:solid;}
.badge-approved{background:#f0fdf4;color:#15803d;border-color:#bbf7d0}
.badge-pending{background:#fffbeb;color:#b45309;border-color:#fde68a}
.badge-rejected{background:#fef2f2;color:#b91c1c;border-color:#fecaca}
.toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%);z-index:999;padding:0.75rem 1.5rem;border-radius:1rem;color:#fff;font-weight:800;font-size:0.9rem;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,0.15);}
</style>
</head>
<body>

<div id="loadingScreen" style="position:fixed;inset:0;background:#fff;z-index:999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;">
  <div style="width:56px;height:56px;border-radius:1.25rem;background:linear-gradient(135deg,#16a34a,#059669);display:flex;align-items:center;justify-content:center;">
    <svg width="28" height="28" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
  </div>
  <div style="font-weight:900;color:#0f172a;font-size:1.1rem;">Loading your shop...</div>
  <svg class="spin" width="24" height="24" fill="none" stroke="#16a34a" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 12a9 9 0 11-6.219-8.56"/></svg>
</div>

<div id="loginScreen" style="display:none;min-height:100vh;background:linear-gradient(160deg,#f0fdf4,#dcfce7);padding:2rem 1.25rem;">
  <div style="text-align:center;padding-top:3rem;margin-bottom:2.5rem;">
    <div style="width:72px;height:72px;border-radius:1.5rem;background:linear-gradient(135deg,#16a34a,#059669);display:flex;align-items:center;justify-content:center;margin:0 auto 1rem;box-shadow:0 8px 24px rgba(22,163,74,0.35);">
      <svg width="34" height="34" fill="none" stroke="white" stroke-width="2.5" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
    </div>
    <div style="font-weight:900;font-size:1.8rem;color:#0f172a;">Shop Owner Portal</div>
    <div style="font-size:0.9rem;color:#64748b;font-weight:800;margin-top:0.35rem;">Aralaganwila Offers</div>
  </div>

  <div class="card" style="padding:2rem 1.5rem;">
